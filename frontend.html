<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>小账本 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff6f0;
    --bg-2: #ffeee3;
    --card: #ffffff;
    --ink: #4a3f3a;
    --ink-soft: #8a7a72;
    --muted: #bfb0a6;
    --pink: #ffb3c1;
    --pink-deep: #ff7a9c;
    --peach: #ffcfa8;
    --mint: #a8e0c5;
    --mint-deep: #6fc9a0;
    --lilac: #d4bfee;
    --cream: #fff4d6;
    --gold: #e8b84a;
    --line: #f4e6dc;
    --shadow: 0 4px 0 rgba(255,179,193,0.2), 0 8px 20px rgba(255,122,156,0.08);
    --shadow-sm: 0 2px 0 rgba(255,179,193,0.2), 0 4px 10px rgba(255,122,156,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Quicksand', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 10% 5%, var(--pink) 0%, transparent 25%),
      radial-gradient(circle at 90% 10%, var(--peach) 0%, transparent 25%),
      radial-gradient(circle at 50% 95%, var(--lilac) 0%, transparent 30%);
    background-attachment: fixed;
    color: var(--ink);
    min-height: 100vh;
    padding: 20px 14px 100px;
    font-size: 15px;
    line-height: 1.6;
    font-weight: 500;
  }
  .container { max-width: 500px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 20px; padding: 18px 0 14px; }
  h1 {
    font-family: 'ZCOOL KuaiLe', 'Quicksand', sans-serif;
    font-size: 34px; font-weight: 400; color: var(--ink); letter-spacing: 2px;
  }
  h1 .emoji { display: inline-block; animation: bounce 2s ease-in-out infinite; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  .subtitle { font-size: 12px; color: var(--ink-soft); margin-top: 4px; letter-spacing: 1px; }

  .tabs {
    display: flex; gap: 6px; margin-bottom: 18px; padding: 6px;
    background: var(--card); border-radius: 20px;
    box-shadow: var(--shadow-sm); overflow-x: auto;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 1; min-width: fit-content; padding: 10px 12px;
    font-family: inherit; font-size: 13px; font-weight: 600;
    background: transparent; border: none; color: var(--ink-soft);
    cursor: pointer; border-radius: 14px; transition: all 0.2s; white-space: nowrap;
  }
  .tab.active {
    background: linear-gradient(135deg, var(--pink), var(--pink-deep));
    color: white; box-shadow: 0 2px 8px rgba(255,122,156,0.3);
  }

  .panel { display: none; animation: fadeIn 0.3s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    background: var(--card); border-radius: 22px; padding: 18px 20px;
    margin-bottom: 14px; box-shadow: var(--shadow);
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 100%; height: 4px; background: var(--cat-color, var(--pink));
  }
  .card-row {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
  }
  .card-name {
    font-size: 16px; font-weight: 700; color: var(--ink);
    display: flex; align-items: center; gap: 6px;
  }
  .card-icon { font-size: 20px; }
  .card-budget {
    font-size: 11px; color: var(--muted); background: var(--bg-2);
    padding: 3px 9px; border-radius: 10px; font-weight: 600;
  }
  .card-amount { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-top: 4px; }
  .card-amount.over { color: #e85d75; }
  .card-amount.warn { color: #e89a4a; }
  .card-amount.ok { color: var(--mint-deep); }
  .card-sub { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
  .card-note {
    font-size: 11px;
    color: var(--ink-soft);
    background: var(--bg-2);
    padding: 6px 10px;
    border-radius: 10px;
    margin: 8px 0 10px;
    line-height: 1.5;
  }

  .bar {
    height: 8px; background: var(--bg-2); border-radius: 10px;
    margin-top: 12px; overflow: hidden;
  }
  .bar-fill {
    height: 100%; border-radius: 10px;
    background: linear-gradient(90deg, var(--mint), var(--mint-deep));
    transition: width 0.4s ease;
  }
  .bar-fill.warn { background: linear-gradient(90deg, var(--peach), #e89a4a); }
  .bar-fill.over { background: linear-gradient(90deg, var(--pink), #e85d75); }

  .savings-total {
    margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line);
    font-size: 12px; color: var(--ink-soft);
    display: flex; justify-content: space-between; align-items: center;
  }
  .savings-total strong { font-size: 18px; color: var(--gold); font-weight: 700; }

  .form-group { margin-bottom: 16px; }
  label {
    display: block; font-size: 12px; color: var(--ink-soft);
    margin-bottom: 6px; font-weight: 600; padding-left: 4px;
  }
  input, select, textarea {
    width: 100%; padding: 13px 16px;
    font-family: inherit; font-size: 15px; font-weight: 500;
    background: var(--bg-2); border: 2px solid transparent;
    color: var(--ink); border-radius: 14px;
    -webkit-appearance: none; appearance: none; transition: all 0.2s;
  }
  select {
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'%3e%3cpath fill='%238a7a72' d='M6 8L0 0h12z'/%3e%3c/svg%3e");
    background-repeat: no-repeat; background-position: right 16px center; padding-right: 40px;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--pink); background: white;
  }

  button.primary {
    width: 100%; padding: 16px;
    font-family: inherit; font-size: 15px; font-weight: 700; letter-spacing: 2px;
    background: linear-gradient(135deg, var(--pink), var(--pink-deep));
    color: white; border: none; border-radius: 16px; cursor: pointer;
    box-shadow: 0 4px 0 rgba(255,122,156,0.3), 0 6px 16px rgba(255,122,156,0.2);
    transition: all 0.15s;
  }
  button.primary:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 rgba(255,122,156,0.3), 0 3px 8px rgba(255,122,156,0.2);
  }

  button.ghost {
    padding: 12px 16px; font-family: inherit; font-size: 13px; font-weight: 600;
    background: var(--bg-2); color: var(--ink); border: none;
    border-radius: 12px; cursor: pointer; transition: all 0.15s;
  }
  button.ghost:active { transform: scale(0.97); }
  button.ghost.danger { background: #ffe0e4; color: #e85d75; }

  .entry {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; background: var(--card); border-radius: 16px;
    margin-bottom: 8px; box-shadow: var(--shadow-sm);
  }
  .entry-icon {
    width: 40px; height: 40px; border-radius: 12px;
    background: var(--cat-color, var(--bg-2));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .entry-mid { flex: 1; min-width: 0; }
  .entry-cat { font-size: 14px; font-weight: 700; color: var(--ink); }
  .entry-note {
    font-size: 11px; color: var(--ink-soft);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .entry-right { text-align: right; flex-shrink: 0; }
  .entry-amt { font-size: 17px; font-weight: 700; color: var(--ink); }
  .entry-date { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .entry-del {
    background: transparent; border: none; color: var(--muted);
    cursor: pointer; font-size: 18px; padding: 4px 8px; margin-left: 4px;
  }
  .entry-del:active { color: #e85d75; }

  .filters { display: flex; gap: 8px; margin-bottom: 14px; }
  .filters select, .filters input { flex: 1; padding: 10px 14px; font-size: 13px; border-radius: 12px; }

  .stat-bar {
    margin-bottom: 14px; background: var(--card);
    padding: 14px 16px; border-radius: 16px; box-shadow: var(--shadow-sm);
  }
  .stat-bar-head {
    display: flex; justify-content: space-between;
    font-size: 13px; font-weight: 600; margin-bottom: 6px;
  }
  .stat-bar-head span:last-child { color: var(--ink-soft); font-size: 12px; }
  .stat-bar-track { height: 8px; background: var(--bg-2); border-radius: 10px; overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 10px; }

  .trend-wrap {
    background: var(--card); padding: 20px 16px 36px;
    border-radius: 20px; box-shadow: var(--shadow); margin-bottom: 14px;
  }
  .trend { display: flex; gap: 4px; align-items: flex-end; height: 130px; }
  .trend-bar {
    flex: 1; min-width: 0;
    background: linear-gradient(180deg, var(--pink), var(--pink-deep));
    border-radius: 6px 6px 0 0; position: relative; transition: all 0.3s; min-height: 2px;
  }
  .trend-label {
    position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
    font-size: 9px; color: var(--muted); white-space: nowrap; font-weight: 600;
  }
  .trend-val {
    position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
    font-size: 9px; color: var(--ink); white-space: nowrap; font-weight: 600;
  }

  .setting-card {
    background: var(--card); border-radius: 18px;
    padding: 14px 16px; margin-bottom: 10px; box-shadow: var(--shadow-sm);
  }
  .setting-head {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px; font-weight: 700; font-size: 14px;
  }
  .setting-inputs { display: flex; gap: 8px; }
  .setting-inputs input { flex: 2; padding: 10px 14px; font-size: 14px; }
  .setting-inputs select { flex: 1; padding: 10px 14px; font-size: 14px; }
  .mini-label {
    display: block; font-size: 11px; color: var(--ink-soft);
    margin: 10px 0 6px; padding-left: 2px; font-weight: 600;
  }
  .note-input {
    padding: 10px 14px !important; font-size: 13px !important;
  }
  .budget-history {
    margin-top: 12px; padding-top: 10px;
    border-top: 1px dashed var(--line);
  }
  .history-label {
    font-size: 11px; color: var(--ink-soft); margin-bottom: 6px; font-weight: 600;
  }
  .history-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 10px; background: var(--bg-2); border-radius: 8px;
    margin-bottom: 4px; font-size: 12px; color: var(--ink-soft);
  }
  .history-item span:nth-child(2) { color: var(--ink); font-weight: 600; }
  .history-del {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 12px; padding: 2px 6px;
  }
  .history-del:active { color: #e85d75; }

  .io-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .io-row button { flex: 1; }

  .empty { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 14px; }
  .empty-emoji { font-size: 40px; display: block; margin-bottom: 8px; }

  .section-title {
    font-size: 15px; font-weight: 700; color: var(--ink);
    margin: 20px 4px 10px; display: flex; align-items: center; gap: 6px;
  }
  .section-title:first-child { margin-top: 4px; }

  .badge {
    display: inline-block; font-size: 9px; padding: 2px 7px;
    background: var(--gold); color: white; border-radius: 8px;
    margin-left: 4px; font-weight: 700; letter-spacing: 0.5px; vertical-align: middle;
  }

  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink); color: white;
    padding: 12px 24px; border-radius: 24px;
    font-size: 13px; font-weight: 600;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    opacity: 0; transition: all 0.3s; z-index: 100; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .card.clickable { cursor: pointer; transition: transform 0.15s; }
  .card.clickable:active { transform: scale(0.98); }

  .list-summary {
    background: var(--card); border-radius: 14px;
    padding: 12px 16px; margin-bottom: 10px;
    box-shadow: var(--shadow-sm);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; font-weight: 600; color: var(--ink-soft);
  }
  .list-summary:empty { display: none; }
  .list-summary strong { font-size: 18px; color: var(--ink); font-weight: 700; }

  .modal {
    position: fixed; inset: 0;
    background: rgba(74,63,58,0.4);
    z-index: 200; display: none;
    align-items: flex-end; justify-content: center;
  }
  .modal.show { display: flex; }
  .modal-sheet {
    width: 100%; max-width: 500px; max-height: 88vh;
    background: var(--bg);
    border-radius: 24px 24px 0 0;
    padding: 20px 16px 40px;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--line);
  }
  .modal-title {
    font-size: 18px; font-weight: 700; color: var(--ink);
    display: flex; align-items: center; gap: 8px;
  }
  .modal-close {
    background: var(--bg-2); border: none;
    width: 34px; height: 34px; border-radius: 50%;
    font-size: 14px; color: var(--ink-soft); cursor: pointer;
  }
  .modal-summary {
    background: var(--card); border-radius: 18px;
    padding: 18px 16px; margin-bottom: 14px;
    box-shadow: var(--shadow-sm); text-align: center;
  }
  .modal-summary .big {
    font-size: 32px; font-weight: 700; color: var(--ink);
    letter-spacing: -1px;
  }
  .modal-summary .label {
    font-size: 12px; color: var(--ink-soft); margin-top: 2px;
  }
  .modal-summary .sub {
    display: flex; justify-content: space-around;
    margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--line);
  }
  .modal-summary .sub div { text-align: center; }
  .modal-summary .sub .v { font-size: 16px; font-weight: 700; color: var(--ink); }
  .modal-summary .sub .k { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
  .modal-note {
    background: var(--bg-2); border-radius: 12px;
    padding: 10px 14px; font-size: 12px; color: var(--ink-soft);
    margin-bottom: 12px; line-height: 1.5;
  }
  .modal-note:empty { display: none; }
  .quick-add { margin-bottom: 14px; }
  .quick-add-toggle {
    width: 100%; padding: 12px;
    font-family: inherit; font-size: 13px; font-weight: 700; letter-spacing: 1px;
    background: linear-gradient(135deg, var(--mint), var(--mint-deep));
    color: white; border: none; border-radius: 14px; cursor: pointer;
    box-shadow: 0 3px 0 rgba(111,201,160,0.3);
  }
  .quick-add-toggle:active { transform: translateY(1px); }
  .quick-add-form {
    background: var(--card); border-radius: 16px;
    padding: 14px; margin-top: 8px;
    box-shadow: var(--shadow-sm);
    animation: fadeIn 0.2s;
  }
  .quick-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .quick-row input { flex: 1; padding: 12px 14px; font-size: 14px; }
  .quick-add-form .primary { margin-top: 8px; padding: 12px; font-size: 14px; letter-spacing: 3px; }

  /* Review module */
  .review-summary {
    display: flex; gap: 10px; margin-bottom: 14px;
  }
  .review-stat {
    flex: 1;
    background: var(--card); border-radius: 16px;
    padding: 14px 12px; text-align: center;
    box-shadow: var(--shadow-sm);
  }
  .review-stat .v {
    font-size: 20px; font-weight: 700; letter-spacing: -0.5px;
  }
  .review-stat .v.pos { color: var(--mint-deep); }
  .review-stat .v.neg { color: #e85d75; }
  .review-stat .k {
    font-size: 11px; color: var(--ink-soft); margin-top: 4px; font-weight: 600;
  }
  .review-item {
    background: var(--card); border-radius: 14px;
    padding: 12px 14px; margin-bottom: 8px;
    box-shadow: var(--shadow-sm);
    display: flex; align-items: center; gap: 12px;
  }
  .review-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .review-mid { flex: 1; min-width: 0; }
  .review-cat { font-size: 14px; font-weight: 700; color: var(--ink); }
  .review-nums {
    font-size: 11px; color: var(--ink-soft); margin-top: 2px;
    font-family: inherit;
  }
  .review-right { text-align: right; flex-shrink: 0; }
  .review-delta {
    font-size: 16px; font-weight: 700;
  }
  .review-delta.pos { color: var(--mint-deep); }
  .review-delta.neg { color: #e85d75; }
  .review-pct {
    font-size: 10px; color: var(--ink-soft); margin-top: 2px; font-weight: 600;
  }
  .review-group-title {
    font-size: 12px; font-weight: 700; color: var(--ink-soft);
    margin: 14px 4px 8px; padding-left: 4px;
    display: flex; align-items: center; gap: 6px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><span class="emoji">🌸</span> 小账本 <span class="emoji">🌸</span></h1>
    <div class="subtitle">记录每一笔小心思</div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="overview">概览</button>
    <button class="tab" data-tab="add">记一笔</button>
    <button class="tab" data-tab="list">明细</button>
    <button class="tab" data-tab="stats">统计</button>
    <button class="tab" data-tab="settings">设置</button>
  </div>

  <div class="panel active" id="panel-overview">
    <div id="overview-cards"></div>
  </div>

  <div class="panel" id="panel-add">
    <div class="card" style="--cat-color: #ffb3c1;">
      <div class="form-group">
        <label>📅 日期</label>
        <input type="date" id="in-date">
      </div>
      <div class="form-group">
        <label>🏷️ 类别</label>
        <select id="in-cat"></select>
      </div>
      <div class="form-group">
        <label>💰 金额</label>
        <input type="number" id="in-amt" step="0.01" placeholder="0.00" inputmode="decimal">
      </div>
      <div class="form-group">
        <label>📝 备注</label>
        <input type="text" id="in-note" placeholder="花在哪儿啦～">
      </div>
      <button class="primary" id="btn-add">✨ 记 上 ✨</button>
    </div>
  </div>

  <div class="panel" id="panel-list">
    <div class="filters">
      <select id="filter-cat"><option value="">全部类别</option></select>
      <select id="filter-range">
        <option value="all">全部时间</option>
        <option value="month">按月份</option>
        <option value="year">按年份</option>
      </select>
    </div>
    <div class="filters" id="filter-period-row" style="display:none;">
      <input type="month" id="filter-month">
      <select id="filter-year"></select>
    </div>
    <div class="list-summary" id="list-summary"></div>
    <div id="entry-list"></div>
  </div>

  <div class="panel" id="panel-stats">
    <div class="section-title">📊 本月分布</div>
    <div id="stats-breakdown"></div>
    <div class="section-title">📈 近 12 月趋势</div>
    <div class="trend-wrap"><div class="trend" id="trend-chart"></div></div>
    <div class="section-title">🪞 预算复盘</div>
    <div class="filters">
      <select id="review-mode">
        <option value="month">按月复盘</option>
        <option value="year">按年复盘</option>
      </select>
      <select id="review-period"></select>
    </div>
    <div id="stats-review"></div>
    <div class="section-title">💎 累计储蓄</div>
    <div id="stats-savings"></div>
  </div>

  <div class="panel" id="panel-settings">
    <div class="section-title">🎯 预算设置</div>
    <div id="budget-settings"></div>
    <div class="section-title">💾 数据</div>
    <div class="card" style="--cat-color: #a8e0c5;">
      <div class="card-sub" style="margin-bottom:10px;">完整备份（含预算设置，建议定期备份）</div>
      <div class="io-row">
        <button class="ghost" id="btn-export-json">💾 导出完整备份</button>
        <button class="ghost" id="btn-import-json">♻️ 恢复完整备份</button>
      </div>
      <input type="file" id="file-import-json" accept=".json" style="display:none">
    </div>
    <div class="card" style="--cat-color: #d4bfee;">
      <div class="card-sub" style="margin-bottom:10px;">CSV（仅明细，适合发给 AI 分析或导入 Excel）</div>
      <div class="io-row">
        <button class="ghost" id="btn-export">📤 导出 CSV</button>
        <button class="ghost" id="btn-import">📥 导入 CSV</button>
      </div>
      <input type="file" id="file-import" accept=".csv" style="display:none">
    </div>
    <div class="card" style="--cat-color: #ffb3c1;">
      <div class="io-row">
        <button class="ghost danger" id="btn-clear">🗑️ 清空全部记录</button>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="cat-modal">
  <div class="modal-sheet">
    <div class="modal-head">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-note" id="modal-note"></div>
      <div class="modal-summary" id="modal-summary"></div>

      <div class="quick-add" id="quick-add">
        <button class="quick-add-toggle" id="quick-add-toggle">✨ 快速记一笔 ✨</button>
        <div class="quick-add-form" id="quick-add-form" style="display:none;">
          <div class="quick-row">
            <input type="date" id="quick-date">
            <input type="number" id="quick-amt" step="0.01" placeholder="金额" inputmode="decimal">
          </div>
          <input type="text" id="quick-note" placeholder="备注（可选）">
          <button class="primary" id="quick-submit">记 上</button>
        </div>
      </div>

      <div class="filters">
        <select id="modal-range">
          <option value="all">全部时间</option>
          <option value="year">按年份</option>
          <option value="month">按月份</option>
        </select>
        <select id="modal-year" style="display:none;"></select>
        <input type="month" id="modal-month" style="display:none;">
      </div>
      <div id="modal-entries"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
 * 小账本 · 数据契约 (Data Contract)
 * ============================================================
 * SCHEMA_VERSION: 2
 *
 * 版本历史：
 *   v1 -> v2: budgets 从单一对象改为带历史的数组，支持按时间查询
 *             新增 categoryNotes 存储用户自定义的类别注释
 *
 * 类别 key 一经定义不再修改（只增不减，不改不删）：
 *   daily, enjoy, dream, growth, sudden, pension, invest, insure
 *
 * CSV 列名契约（顺序可变，按列名读取）：
 *   id, date, category_key, category_name, amount, note
 *
 * JSON 完整备份格式：
 *   {
 *     "schema_version": 2,
 *     "exported_at": "ISO日期",
 *     "app": "yuri-ledger",
 *     "entries": [...],
 *     "budgets": { daily: [{from: "2026-01", amount: 2000, period: "month"}, ...], ... },
 *     "categoryNotes": { daily: "自定义注释", ... }
 *   }
 *
 * 向后兼容：导入 v1 数据时，旧的 budgets 对象会被自动转换为 v2 的数组格式
 * ============================================================ */
const SCHEMA_VERSION = 2;

const CATEGORIES = [
  { key: 'daily',   name: '日常支出', type: 'expense', icon: '🍚', color: '#ffcfa8',
    defaultNote: '房租/房贷 · 水电燃气 · 物业 · 话费网费 · 日常饮食 · 交通 · 日用品' },
  { key: 'enjoy',   name: '享受支出', type: 'expense', icon: '🍰', color: '#ffb3c1',
    defaultNote: '衣服饰品 · 娱乐 · 美食 · 美容' },
  { key: 'dream',   name: '梦想账户', type: 'expense', icon: '🌈', color: '#d4bfee',
    defaultNote: '大件购物 · 旅行 · 医美 · 黄金' },
  { key: 'growth',  name: '成长支出', type: 'expense', icon: '📚', color: '#a8d8e0',
    defaultNote: '教练 · AI · 书籍 · 按摩' },
  { key: 'sudden',  name: '突然支出', type: 'expense', icon: '⚡', color: '#ffd685',
    defaultNote: '医疗 · 人情 · 家庭' },
  { key: 'pension', name: '养老金',   type: 'saving',  icon: '🏡', color: '#a8e0c5',
    defaultNote: '为未来的自己存一点' },
  { key: 'invest',  name: '投资金',   type: 'saving',  icon: '🌱', color: '#c5e8a5',
    defaultNote: '长期持有 · 复利增长' },
  { key: 'insure',  name: '保险金',   type: 'saving',  icon: '🛡️', color: '#b8d4f0',
    defaultNote: '给生活一份保障' },
];

// 预算以历史记录形式存储：每条 { from: "YYYY-MM", amount, period }
// 查询某月/年的预算时，取该时间点之前最新的一条
const DEFAULT_BUDGETS = {
  daily:   [{ from: '2000-01', amount: 2000, period: 'month' }],
  enjoy:   [{ from: '2000-01', amount: 500,  period: 'month' }],
  dream:   [{ from: '2000-01', amount: 5000, period: 'year'  }],
  growth:  [{ from: '2000-01', amount: 300,  period: 'month' }],
  sudden:  [{ from: '2000-01', amount: 2000, period: 'year'  }],
  pension: [{ from: '2000-01', amount: 500,  period: 'month' }],
  invest:  [{ from: '2000-01', amount: 1000, period: 'month' }],
  insure:  [{ from: '2000-01', amount: 3000, period: 'year'  }],
};

const KEY_ENTRIES = 'yuri_ledger_entries_v1';
const KEY_BUDGETS = 'yuri_ledger_budgets_v2';
const KEY_BUDGETS_V1 = 'yuri_ledger_budgets_v1'; // 用于迁移
const KEY_NOTES = 'yuri_ledger_cat_notes_v1';

// ==== 云端同步配置（连 MCP 后台）====
const LEDGER_TOKEN = "__TOKEN__";
const API = "/" + LEDGER_TOKEN + "/api";
let cloudReady = false;
async function cloudLoad(){
  try{
    const r = await fetch(API + "/state");
    if(!r.ok) throw 0;
    const d = await r.json();
    state.entries = d.entries || [];
    if(d.budgets) Object.assign(state.budgets, d.budgets);
    state.categoryNotes = d.categoryNotes || {};
    cloudReady = true;
    return true;
  }catch(e){ cloudReady=false; return false; }
}
async function cloudSync(){
  if(!cloudReady) return;
  try{
    await fetch(API + "/sync", {method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({entries:state.entries, budgets:state.budgets, categoryNotes:state.categoryNotes})});
  }catch(e){}
}

let state = {
  entries: [],
  budgets: JSON.parse(JSON.stringify(DEFAULT_BUDGETS)),
  categoryNotes: {},
};

// 把 v1 的单对象预算转成 v2 的历史数组
function migrateBudgetsV1toV2(v1) {
  const v2 = {};
  Object.keys(v1).forEach(key => {
    const b = v1[key];
    if (b && typeof b.amount === 'number') {
      v2[key] = [{ from: '2000-01', amount: b.amount, period: b.period || 'month' }];
    }
  });
  return v2;
}

function load() {
  try {
    const e = localStorage.getItem(KEY_ENTRIES);
    if (e) state.entries = JSON.parse(e);
  } catch(e) {}
  try {
    const b2 = localStorage.getItem(KEY_BUDGETS);
    if (b2) {
      const parsed = JSON.parse(b2);
      // 合并默认值（新增的类别）
      CATEGORIES.forEach(c => {
        if (parsed[c.key] && Array.isArray(parsed[c.key]) && parsed[c.key].length > 0) {
          state.budgets[c.key] = parsed[c.key];
        }
      });
    } else {
      // 尝试从 v1 迁移
      const b1 = localStorage.getItem(KEY_BUDGETS_V1);
      if (b1) {
        const migrated = migrateBudgetsV1toV2(JSON.parse(b1));
        Object.assign(state.budgets, migrated);
        saveBudgets();
      }
    }
  } catch(e) {}
  try {
    const n = localStorage.getItem(KEY_NOTES);
    if (n) state.categoryNotes = JSON.parse(n);
  } catch(e) {}
}
function saveEntries() {
  try { localStorage.setItem(KEY_ENTRIES, JSON.stringify(state.entries)); } catch(e) {}
  cloudSync();
}
function saveBudgets() {
  try { localStorage.setItem(KEY_BUDGETS, JSON.stringify(state.budgets)); } catch(e) {}
  cloudSync();
}
function saveNotes() {
  try { localStorage.setItem(KEY_NOTES, JSON.stringify(state.categoryNotes)); } catch(e) {}
  cloudSync();
}

// 获取某类别在指定月份（YYYY-MM）生效的预算
function getBudgetAt(catKey, yearMonth) {
  const hist = state.budgets[catKey] || [];
  if (hist.length === 0) return { amount: 0, period: 'month' };
  // 找到 from <= yearMonth 的最新一条
  let result = hist[0];
  for (const b of hist) {
    if (b.from <= yearMonth && b.from >= result.from) result = b;
  }
  return result;
}

// 获取当前生效的预算
function getCurrentBudget(catKey) {
  const thisMonth = todayStr().slice(0,7);
  return getBudgetAt(catKey, thisMonth);
}

// 获取类别注释（优先用户自定义，否则用默认）
function getCatNote(catKey) {
  if (state.categoryNotes[catKey] !== undefined) return state.categoryNotes[catKey];
  const cat = catByKey(catKey);
  return cat ? cat.defaultNote : '';
}

const fmt = n => '¥' + (n || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
const catByKey = k => CATEGORIES.find(c => c.key === k);
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const monthStr = d => d.slice(0,7);
const yearStr = d => d.slice(0,4);

function periodSpent(catKey, period) {
  const today = todayStr();
  const thisMonth = today.slice(0,7);
  const thisYear = today.slice(0,4);
  return state.entries
    .filter(e => e.cat === catKey)
    .filter(e => period === 'month' ? monthStr(e.date) === thisMonth : yearStr(e.date) === thisYear)
    .reduce((s,e) => s + e.amount, 0);
}
function totalSpent(catKey) {
  return state.entries.filter(e => e.cat === catKey).reduce((s,e) => s + e.amount, 0);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

function renderOverview() {
  const box = document.getElementById('overview-cards');
  box.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const budget = getCurrentBudget(cat.key);
    const spent = periodSpent(cat.key, budget.period);
    const remaining = budget.amount - spent;
    const pct = budget.amount > 0 ? Math.min(100, (spent / budget.amount) * 100) : 0;
    let statusClass = 'ok';
    if (pct >= 100) statusClass = 'over';
    else if (pct >= 80) statusClass = 'warn';
    const periodLabel = budget.period === 'month' ? '本月' : '本年';
    const isSaving = cat.type === 'saving';
    const note = getCatNote(cat.key);
    let savingsHtml = '';
    if (isSaving) {
      const total = totalSpent(cat.key);
      savingsHtml = `<div class="savings-total">💎 累计总额 <strong>${fmt(total)}</strong></div>`;
    }
    const card = document.createElement('div');
    card.className = 'card clickable';
    card.style.setProperty('--cat-color', cat.color);
    card.innerHTML = `
      <div class="card-row">
        <div class="card-name"><span class="card-icon">${cat.icon}</span>${cat.name}${isSaving ? '<span class="badge">储蓄</span>' : ''}</div>
        <div class="card-budget">${periodLabel} ${fmt(budget.amount)}</div>
      </div>
      ${note ? `<div class="card-note">${note}</div>` : ''}
      <div class="card-amount ${statusClass}">${isSaving ? fmt(spent) : fmt(remaining)}</div>
      <div class="card-sub">${isSaving ? `${periodLabel}已存入` : `${periodLabel}剩余 · 已花 ${fmt(spent)}`}</div>
      <div class="bar"><div class="bar-fill ${statusClass}" style="width:${pct}%"></div></div>
      ${savingsHtml}
    `;
    card.addEventListener('click', () => openCatModal(cat.key));
    box.appendChild(card);
  });
}

function initAddForm() {
  document.getElementById('in-cat').innerHTML =
    CATEGORIES.map(c => `<option value="${c.key}">${c.icon} ${c.name}</option>`).join('');
  document.getElementById('in-date').value = todayStr();
}

function addEntry() {
  const date = document.getElementById('in-date').value;
  const cat = document.getElementById('in-cat').value;
  const amt = parseFloat(document.getElementById('in-amt').value);
  const note = document.getElementById('in-note').value.trim();
  if (!date || !cat || !amt || amt <= 0) { toast('请填写日期和金额哦 🌟'); return; }
  state.entries.push({
    id: Date.now() + '-' + Math.random().toString(36).slice(2,7),
    date, cat, amount: amt, note,
  });
  saveEntries();
  document.getElementById('in-amt').value = '';
  document.getElementById('in-note').value = '';
  renderAll();
  toast('记好啦 ✨');
  switchTab('overview');
}

function initListFilters() {
  document.getElementById('filter-cat').innerHTML = '<option value="">全部类别</option>' +
    CATEGORIES.map(c => `<option value="${c.key}">${c.icon} ${c.name}</option>`).join('');
  // 年份下拉 - 根据数据生成
  const years = new Set(state.entries.map(e => yearStr(e.date)));
  years.add(String(new Date().getFullYear()));
  const sortedYears = [...years].sort().reverse();
  document.getElementById('filter-year').innerHTML =
    sortedYears.map(y => `<option value="${y}">${y} 年</option>`).join('');
}

function updateFilterRow() {
  const range = document.getElementById('filter-range').value;
  const row = document.getElementById('filter-period-row');
  const monthIn = document.getElementById('filter-month');
  const yearIn = document.getElementById('filter-year');
  if (range === 'all') {
    row.style.display = 'none';
  } else {
    row.style.display = 'flex';
    monthIn.style.display = range === 'month' ? 'block' : 'none';
    yearIn.style.display = range === 'year' ? 'block' : 'none';
  }
}

function renderList() {
  const box = document.getElementById('entry-list');
  const sumBox = document.getElementById('list-summary');
  const filterCat = document.getElementById('filter-cat').value;
  const range = document.getElementById('filter-range').value;
  const filterMonth = document.getElementById('filter-month').value;
  const filterYear = document.getElementById('filter-year').value;

  let items = [...state.entries].sort((a,b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
  if (filterCat) items = items.filter(e => e.cat === filterCat);
  if (range === 'month' && filterMonth) items = items.filter(e => monthStr(e.date) === filterMonth);
  if (range === 'year' && filterYear) items = items.filter(e => yearStr(e.date) === filterYear);

  // 汇总
  const total = items.reduce((s,e) => s + e.amount, 0);
  let label = '全部时间';
  if (range === 'month' && filterMonth) label = filterMonth;
  else if (range === 'year' && filterYear) label = filterYear + ' 年';
  if (items.length > 0) {
    sumBox.innerHTML = `<span>${label} · ${items.length} 笔</span><strong>${fmt(total)}</strong>`;
  } else {
    sumBox.innerHTML = '';
  }

  if (items.length === 0) {
    box.innerHTML = '<div class="empty"><span class="empty-emoji">🌱</span>还没有记录～</div>';
    return;
  }
  box.innerHTML = items.map(e => {
    const cat = catByKey(e.cat) || { name: e.cat, icon: '❓', color: '#eee' };
    return `
      <div class="entry">
        <div class="entry-icon" style="background:${cat.color};">${cat.icon}</div>
        <div class="entry-mid">
          <div class="entry-cat">${cat.name}</div>
          <div class="entry-note">${e.note || '—'}</div>
        </div>
        <div class="entry-right">
          <div class="entry-amt">${fmt(e.amount)}</div>
          <div class="entry-date">${e.date.slice(5)}</div>
        </div>
        <button class="entry-del" data-id="${e.id}">✕</button>
      </div>
    `;
  }).join('');
  box.querySelectorAll('.entry-del').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!confirm('删除这条记录？')) return;
      state.entries = state.entries.filter(e => e.id !== btn.dataset.id);
      saveEntries();
      renderAll();
      toast('已删除');
    });
  });
}

// ---------- Category Modal ----------
let currentModalCat = null;

function openCatModal(catKey) {
  currentModalCat = catKey;
  const cat = catByKey(catKey);
  if (!cat) return;
  document.getElementById('modal-title').innerHTML =
    `<span>${cat.icon}</span>${cat.name}`;
  // 显示注释
  const note = getCatNote(catKey);
  document.getElementById('modal-note').textContent = note || '';
  // 重置筛选
  document.getElementById('modal-range').value = 'all';
  document.getElementById('modal-year').style.display = 'none';
  document.getElementById('modal-month').style.display = 'none';
  // 填充年份选项
  const years = new Set(state.entries.filter(e => e.cat === catKey).map(e => yearStr(e.date)));
  years.add(String(new Date().getFullYear()));
  const sortedYears = [...years].sort().reverse();
  document.getElementById('modal-year').innerHTML =
    sortedYears.map(y => `<option value="${y}">${y} 年</option>`).join('');
  // 默认当月
  document.getElementById('modal-month').value = todayStr().slice(0,7);
  // 重置快速记账
  document.getElementById('quick-add-form').style.display = 'none';
  document.getElementById('quick-date').value = todayStr();
  document.getElementById('quick-amt').value = '';
  document.getElementById('quick-note').value = '';
  renderModalContent();
  document.getElementById('cat-modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function quickAddEntry() {
  if (!currentModalCat) return;
  const date = document.getElementById('quick-date').value;
  const amt = parseFloat(document.getElementById('quick-amt').value);
  const note = document.getElementById('quick-note').value.trim();
  if (!date || !amt || amt <= 0) {
    toast('请填写日期和金额 🌟');
    return;
  }
  state.entries.push({
    id: Date.now() + '-' + Math.random().toString(36).slice(2,7),
    date, cat: currentModalCat, amount: amt, note,
  });
  saveEntries();
  document.getElementById('quick-amt').value = '';
  document.getElementById('quick-note').value = '';
  renderModalContent();
  renderAll();
  toast('记好啦 ✨');
}

function closeCatModal() {
  document.getElementById('cat-modal').classList.remove('show');
  document.body.style.overflow = '';
  currentModalCat = null;
}

function renderModalContent() {
  if (!currentModalCat) return;
  const cat = catByKey(currentModalCat);
  const range = document.getElementById('modal-range').value;
  const year = document.getElementById('modal-year').value;
  const month = document.getElementById('modal-month').value;

  // 显示/隐藏对应的筛选器
  document.getElementById('modal-year').style.display = range === 'year' ? 'block' : 'none';
  document.getElementById('modal-month').style.display = range === 'month' ? 'block' : 'none';

  let items = state.entries.filter(e => e.cat === currentModalCat);
  let scopeLabel = '全部时间';
  if (range === 'year' && year) {
    items = items.filter(e => yearStr(e.date) === year);
    scopeLabel = year + ' 年';
  } else if (range === 'month' && month) {
    items = items.filter(e => monthStr(e.date) === month);
    scopeLabel = month;
  }
  items.sort((a,b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id));

  const total = items.reduce((s,e) => s + e.amount, 0);
  const count = items.length;
  const avg = count > 0 ? total / count : 0;
  // 按月份拆分本段时间
  const monthsInScope = new Set(items.map(e => monthStr(e.date)));
  const monthAvg = monthsInScope.size > 0 ? total / monthsInScope.size : 0;

  // 汇总区
  const sumBox = document.getElementById('modal-summary');
  sumBox.innerHTML = `
    <div class="big">${fmt(total)}</div>
    <div class="label">${scopeLabel} · ${cat.name}</div>
    <div class="sub">
      <div><div class="v">${count}</div><div class="k">笔数</div></div>
      <div><div class="v">${fmt(avg)}</div><div class="k">每笔均值</div></div>
      <div><div class="v">${fmt(monthAvg)}</div><div class="k">月均</div></div>
    </div>
  `;

  // 明细列表
  const listBox = document.getElementById('modal-entries');
  if (items.length === 0) {
    listBox.innerHTML = '<div class="empty"><span class="empty-emoji">🌱</span>此时段暂无记录</div>';
    return;
  }
  listBox.innerHTML = items.map(e => `
    <div class="entry">
      <div class="entry-icon" style="background:${cat.color};">${cat.icon}</div>
      <div class="entry-mid">
        <div class="entry-cat">${e.date}</div>
        <div class="entry-note">${e.note || '—'}</div>
      </div>
      <div class="entry-right">
        <div class="entry-amt">${fmt(e.amount)}</div>
      </div>
      <button class="entry-del" data-id="${e.id}">✕</button>
    </div>
  `).join('');
  listBox.querySelectorAll('.entry-del').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!confirm('删除这条记录？')) return;
      state.entries = state.entries.filter(e => e.id !== btn.dataset.id);
      saveEntries();
      renderAll();
      renderModalContent();
      toast('已删除');
    });
  });
}

function renderStats() {
  const thisMonth = todayStr().slice(0,7);
  const breakdown = {};
  let total = 0;
  state.entries.filter(e => monthStr(e.date) === thisMonth).forEach(e => {
    breakdown[e.cat] = (breakdown[e.cat] || 0) + e.amount;
    total += e.amount;
  });
  const bBox = document.getElementById('stats-breakdown');
  if (total === 0) {
    bBox.innerHTML = '<div class="empty"><span class="empty-emoji">🌷</span>本月还没有支出～</div>';
  } else {
    bBox.innerHTML = CATEGORIES.map(c => {
      const amt = breakdown[c.key] || 0;
      const pct = total > 0 ? (amt / total) * 100 : 0;
      if (amt === 0) return '';
      return `
        <div class="stat-bar">
          <div class="stat-bar-head">
            <span>${c.icon} ${c.name}</span>
            <span>${fmt(amt)} · ${pct.toFixed(1)}%</span>
          </div>
          <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%;background:${c.color};"></div></div>
        </div>
      `;
    }).join('');
  }

  const months = [];
  const now = new Date();
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  }
  const monthTotals = months.map(m =>
    state.entries.filter(e => monthStr(e.date) === m).reduce((s,e) => s + e.amount, 0)
  );
  const maxT = Math.max(...monthTotals, 1);
  document.getElementById('trend-chart').innerHTML = months.map((m, i) => {
    const h = (monthTotals[i] / maxT) * 100;
    return `
      <div class="trend-bar" style="height:${Math.max(h, 2)}%">
        <div class="trend-val">${monthTotals[i] > 0 ? Math.round(monthTotals[i]) : ''}</div>
        <div class="trend-label">${m.slice(2)}</div>
      </div>
    `;
  }).join('');

  const sBox = document.getElementById('stats-savings');
  const savings = CATEGORIES.filter(c => c.type === 'saving');
  sBox.innerHTML = savings.map(c => {
    const tot = totalSpent(c.key);
    return `
      <div class="card" style="--cat-color:${c.color};">
        <div class="card-row">
          <div class="card-name"><span class="card-icon">${c.icon}</span>${c.name}</div>
        </div>
        <div class="card-amount" style="color:var(--gold);">${fmt(tot)}</div>
        <div class="card-sub">历史累计存入</div>
      </div>
    `;
  }).join('');

  renderReview();
}

// ---------- Review (预算复盘) ----------
function initReviewFilter() {
  const mode = document.getElementById('review-mode').value;
  const periodSel = document.getElementById('review-period');
  const today = todayStr();
  if (mode === 'month') {
    // 列出有数据的月份 + 当前月
    const months = new Set(state.entries.map(e => monthStr(e.date)));
    months.add(today.slice(0,7));
    const sorted = [...months].sort().reverse();
    periodSel.innerHTML = sorted.map(m => `<option value="${m}">${m}</option>`).join('');
  } else {
    const years = new Set(state.entries.map(e => yearStr(e.date)));
    years.add(today.slice(0,4));
    const sorted = [...years].sort().reverse();
    periodSel.innerHTML = sorted.map(y => `<option value="${y}">${y} 年</option>`).join('');
  }
}

function renderReview() {
  const box = document.getElementById('stats-review');
  const mode = document.getElementById('review-mode').value;
  const period = document.getElementById('review-period').value;
  if (!period) { box.innerHTML = ''; return; }

  // 对每个支出类别（非储蓄），计算该时段内的预算 vs 实际
  const expenseCats = CATEGORIES.filter(c => c.type === 'expense');
  const results = [];

  expenseCats.forEach(cat => {
    const budgetInfo = mode === 'month'
      ? getBudgetAt(cat.key, period)
      : getBudgetAt(cat.key, period + '-12'); // 取该年最后生效的预算

    // 只统计符合 period 的支出
    const spent = state.entries
      .filter(e => e.cat === cat.key)
      .filter(e => mode === 'month' ? monthStr(e.date) === period : yearStr(e.date) === period)
      .reduce((s,e) => s + e.amount, 0);

    // 对应的预算额度
    let budgetAmount;
    if (mode === 'month') {
      // 按月复盘：如果预算是月预算，直接用；如果是年预算，按 1/12 折算
      budgetAmount = budgetInfo.period === 'month'
        ? budgetInfo.amount
        : budgetInfo.amount / 12;
    } else {
      // 按年复盘：如果预算是年预算，直接用；如果是月预算，×12
      budgetAmount = budgetInfo.period === 'year'
        ? budgetInfo.amount
        : budgetInfo.amount * 12;
    }

    const delta = budgetAmount - spent; // 正数=结余，负数=超支
    const pct = budgetAmount > 0 ? (spent / budgetAmount) * 100 : 0;

    results.push({
      cat, spent, budgetAmount, delta, pct,
      status: delta >= 0 ? 'saved' : 'over',
    });
  });

  // 汇总
  const totalBudget = results.reduce((s,r) => s + r.budgetAmount, 0);
  const totalActual = results.reduce((s,r) => s + r.spent, 0);
  const totalDelta = totalBudget - totalActual;

  const saved = results.filter(r => r.status === 'saved').sort((a,b) => b.delta - a.delta);
  const over = results.filter(r => r.status === 'over').sort((a,b) => a.delta - b.delta);

  const periodLabel = mode === 'month' ? period : (period + ' 年');
  const modeLabel = mode === 'month' ? '月' : '年';

  let html = `
    <div class="review-summary">
      <div class="review-stat">
        <div class="v">${fmt(totalBudget)}</div>
        <div class="k">${modeLabel}度总预算</div>
      </div>
      <div class="review-stat">
        <div class="v">${fmt(totalActual)}</div>
        <div class="k">实际花费</div>
      </div>
      <div class="review-stat">
        <div class="v ${totalDelta >= 0 ? 'pos' : 'neg'}">${totalDelta >= 0 ? '+' : ''}${fmt(totalDelta)}</div>
        <div class="k">${totalDelta >= 0 ? '总结余' : '总超支'}</div>
      </div>
    </div>
  `;

  if (over.length > 0) {
    html += `<div class="review-group-title">⚠️ 超支项 · ${over.length} 项</div>`;
    over.forEach(r => {
      html += `
        <div class="review-item">
          <div class="review-icon" style="background:${r.cat.color};">${r.cat.icon}</div>
          <div class="review-mid">
            <div class="review-cat">${r.cat.name}</div>
            <div class="review-nums">实花 ${fmt(r.spent)} · 预算 ${fmt(r.budgetAmount)}</div>
          </div>
          <div class="review-right">
            <div class="review-delta neg">${fmt(r.delta)}</div>
            <div class="review-pct">${r.pct.toFixed(0)}%</div>
          </div>
        </div>
      `;
    });
  }

  if (saved.length > 0) {
    html += `<div class="review-group-title">🌿 结余项 · ${saved.length} 项</div>`;
    saved.forEach(r => {
      html += `
        <div class="review-item">
          <div class="review-icon" style="background:${r.cat.color};">${r.cat.icon}</div>
          <div class="review-mid">
            <div class="review-cat">${r.cat.name}</div>
            <div class="review-nums">实花 ${fmt(r.spent)} · 预算 ${fmt(r.budgetAmount)}</div>
          </div>
          <div class="review-right">
            <div class="review-delta pos">+${fmt(r.delta)}</div>
            <div class="review-pct">${r.pct.toFixed(0)}%</div>
          </div>
        </div>
      `;
    });
  }

  if (over.length === 0 && saved.length === 0) {
    html += '<div class="empty"><span class="empty-emoji">🌷</span>此时段暂无数据</div>';
  }

  box.innerHTML = html;
}

function renderSettings() {
  const box = document.getElementById('budget-settings');
  box.innerHTML = CATEGORIES.map(c => {
    const current = getCurrentBudget(c.key);
    const hist = state.budgets[c.key] || [];
    const note = getCatNote(c.key);
    const historyHtml = hist.length > 1 ? `
      <div class="budget-history">
        <div class="history-label">预算变更历史：</div>
        ${[...hist].sort((a,b) => b.from.localeCompare(a.from)).map((h, i) => `
          <div class="history-item">
            <span>${h.from} 起</span>
            <span>${fmt(h.amount)} / ${h.period === 'month' ? '月' : '年'}</span>
            ${hist.length > 1 ? `<button class="history-del" data-cat="${c.key}" data-from="${h.from}">✕</button>` : ''}
          </div>
        `).join('')}
      </div>
    ` : '';
    return `
      <div class="setting-card" style="border-left:4px solid ${c.color};">
        <div class="setting-head">${c.icon} ${c.name}</div>
        <label class="mini-label">当前预算</label>
        <div class="setting-inputs">
          <input type="number" data-cat="${c.key}" data-field="amount" value="${current.amount}" step="1" inputmode="decimal">
          <select data-cat="${c.key}" data-field="period">
            <option value="month" ${current.period==='month'?'selected':''}>每月</option>
            <option value="year"  ${current.period==='year'?'selected':''}>每年</option>
          </select>
        </div>
        <label class="mini-label">类别注释（记账时提示用）</label>
        <input type="text" class="note-input" data-cat="${c.key}" value="${note.replace(/"/g, '&quot;')}" placeholder="例如：房租 · 水电 · 吃饭">
        ${historyHtml}
      </div>
    `;
  }).join('');

  // 预算金额/周期变更：如果和当前生效的不同，则新增一条历史记录
  box.querySelectorAll('input[data-field], select[data-field]').forEach(el => {
    const handler = () => {
      const cat = el.dataset.cat;
      const field = el.dataset.field;
      const current = getCurrentBudget(cat);
      const newAmount = field === 'amount' ? (parseFloat(el.value) || 0) : current.amount;
      const newPeriod = field === 'period' ? el.value : current.period;
      if (newAmount === current.amount && newPeriod === current.period) return;

      const thisMonth = todayStr().slice(0,7);
      const hist = state.budgets[cat] || [];
      // 如果当前月已经有一条记录，就直接更新它；否则新增一条
      const existingThisMonth = hist.find(h => h.from === thisMonth);
      if (existingThisMonth) {
        existingThisMonth.amount = newAmount;
        existingThisMonth.period = newPeriod;
      } else {
        hist.push({ from: thisMonth, amount: newAmount, period: newPeriod });
      }
      state.budgets[cat] = hist;
      saveBudgets();
      renderSettings();
      toast('已保存 ✨');
    };
    el.addEventListener('change', handler);
    if (el.tagName === 'INPUT') el.addEventListener('blur', handler);
  });

  // 注释编辑
  box.querySelectorAll('.note-input').forEach(el => {
    const handler = () => {
      const cat = el.dataset.cat;
      state.categoryNotes[cat] = el.value.trim();
      saveNotes();
      toast('注释已保存 ✨');
    };
    el.addEventListener('change', handler);
    el.addEventListener('blur', handler);
  });

  // 删除历史
  box.querySelectorAll('.history-del').forEach(btn => {
    btn.addEventListener('click', () => {
      const cat = btn.dataset.cat;
      const from = btn.dataset.from;
      if (state.budgets[cat].length <= 1) {
        toast('至少要保留一条预算');
        return;
      }
      if (!confirm(`删除 ${from} 起的这条预算记录？`)) return;
      state.budgets[cat] = state.budgets[cat].filter(h => h.from !== from);
      saveBudgets();
      renderSettings();
      renderAll();
      toast('已删除');
    });
  });
}

function exportJSON() {
  const data = {
    schema_version: SCHEMA_VERSION,
    exported_at: new Date().toISOString(),
    app: 'yuri-ledger',
    entries: state.entries,
    budgets: state.budgets,
    categoryNotes: state.categoryNotes,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ledger-backup-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('备份成功 💾');
}

function importJSON(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      // 基本结构校验
      if (!data || typeof data !== 'object') throw new Error('文件格式不正确');
      if (!Array.isArray(data.entries)) throw new Error('缺少 entries');
      // 版本检查：只拒绝比当前版本更新的
      if (data.schema_version && data.schema_version > SCHEMA_VERSION) {
        if (!confirm(`这是更新版本（v${data.schema_version}）的备份，当前是 v${SCHEMA_VERSION}，可能有数据丢失。继续导入？`)) return;
      }
      const merge = confirm('【确定】合并到现有数据\n【取消】完全替换现有数据\n（预算设置会被新备份覆盖）');
      // 过滤出合法的 entries
      const validCats = new Set(CATEGORIES.map(c => c.key));
      const validEntries = data.entries.filter(e =>
        e && e.date && e.cat && validCats.has(e.cat) && typeof e.amount === 'number'
      );
      if (merge) {
        const existingIds = new Set(state.entries.map(e => e.id));
        validEntries.forEach(e => {
          if (!existingIds.has(e.id)) state.entries.push(e);
        });
      } else {
        state.entries = validEntries;
      }
      // 预算恢复（兼容 v1 单对象 和 v2 数组）
      if (data.budgets && typeof data.budgets === 'object') {
        CATEGORIES.forEach(c => {
          const b = data.budgets[c.key];
          if (!b) return;
          if (Array.isArray(b) && b.length > 0) {
            // v2 格式
            const valid = b.filter(h => h && typeof h.amount === 'number' && h.from &&
              (h.period === 'month' || h.period === 'year'));
            if (valid.length > 0) state.budgets[c.key] = valid;
          } else if (typeof b.amount === 'number' && (b.period === 'month' || b.period === 'year')) {
            // v1 格式 → 迁移
            state.budgets[c.key] = [{ from: '2000-01', amount: b.amount, period: b.period }];
          }
        });
      }
      // 类别注释恢复
      if (data.categoryNotes && typeof data.categoryNotes === 'object') {
        Object.keys(data.categoryNotes).forEach(k => {
          if (CATEGORIES.find(c => c.key === k) && typeof data.categoryNotes[k] === 'string') {
            state.categoryNotes[k] = data.categoryNotes[k];
          }
        });
      }
      saveEntries();
      saveBudgets();
      saveNotes();
      renderAll();
      renderSettings();
      toast(`恢复成功：${validEntries.length} 条记录 ✨`);
    } catch (err) {
      toast('恢复失败：' + err.message);
    }
  };
  reader.readAsText(file, 'utf-8');
}

function exportCSV() {
  const headers = ['id', 'date', 'category_key', 'category_name', 'amount', 'note'];
  const rows = state.entries.map(e => {
    const cat = catByKey(e.cat);
    return [e.id, e.date, e.cat, cat ? cat.name : '', e.amount, (e.note || '').replace(/"/g, '""')];
  });
  const csv = [headers, ...rows].map(r => r.map(f => `"${f}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ledger-${todayStr()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('导出成功 📤');
}

function importCSV(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      let text = e.target.result;
      if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) { toast('文件是空的～'); return; }
      const parseLine = (line) => {
        const result = [];
        let cur = '', inQuote = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') {
            if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
            else inQuote = !inQuote;
          } else if (ch === ',' && !inQuote) {
            result.push(cur); cur = '';
          } else cur += ch;
        }
        result.push(cur);
        return result;
      };
      const headers = parseLine(lines[0]).map(h => h.trim().toLowerCase());
      const idxDate = headers.indexOf('date');
      const idxCat = headers.indexOf('category_key');
      const idxAmt = headers.indexOf('amount');
      const idxNote = headers.indexOf('note');
      const idxId = headers.indexOf('id');
      if (idxDate < 0 || idxCat < 0 || idxAmt < 0) { toast('CSV 格式不正确'); return; }
      const merge = confirm('【确定】合并到现有数据\n【取消】替换现有数据');
      const newEntries = [];
      for (let i = 1; i < lines.length; i++) {
        const f = parseLine(lines[i]);
        const cat = f[idxCat];
        if (!CATEGORIES.find(c => c.key === cat)) continue;
        newEntries.push({
          id: (idxId >= 0 && f[idxId]) ? f[idxId] : (Date.now() + '-' + i),
          date: f[idxDate], cat: cat,
          amount: parseFloat(f[idxAmt]) || 0,
          note: idxNote >= 0 ? f[idxNote] : '',
        });
      }
      if (merge) {
        const existingIds = new Set(state.entries.map(e => e.id));
        newEntries.forEach(e => { if (!existingIds.has(e.id)) state.entries.push(e); });
      } else {
        state.entries = newEntries;
      }
      saveEntries();
      renderAll();
      toast(`导入了 ${newEntries.length} 条 ✨`);
    } catch (err) { toast('导入失败'); }
  };
  reader.readAsText(file, 'utf-8');
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
  if (name === 'stats') {
    initReviewFilter();
    // 默认选当前月/年
    const today = todayStr();
    const mode = document.getElementById('review-mode').value;
    document.getElementById('review-period').value = mode === 'month' ? today.slice(0,7) : today.slice(0,4);
    renderStats();
  }
  if (name === 'list') renderList();
  if (name === 'settings') renderSettings();
  if (name === 'overview') renderOverview();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderAll() { renderOverview(); renderList(); }

(async function init() {
  load();
  initAddForm();
  initListFilters();
  renderAll();
  const ok = await cloudLoad();
  if (ok) renderAll();
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
  document.getElementById('btn-add').addEventListener('click', addEntry);
  document.getElementById('filter-cat').addEventListener('change', renderList);
  document.getElementById('filter-range').addEventListener('change', () => {
    updateFilterRow();
    renderList();
  });
  document.getElementById('filter-month').addEventListener('change', renderList);
  document.getElementById('filter-year').addEventListener('change', renderList);
  document.getElementById('modal-close').addEventListener('click', closeCatModal);
  document.getElementById('cat-modal').addEventListener('click', (e) => {
    if (e.target.id === 'cat-modal') closeCatModal();
  });
  document.getElementById('modal-range').addEventListener('change', renderModalContent);
  document.getElementById('modal-year').addEventListener('change', renderModalContent);
  document.getElementById('modal-month').addEventListener('change', renderModalContent);

  // 快速记账（在 modal 内）
  document.getElementById('quick-add-toggle').addEventListener('click', () => {
    const form = document.getElementById('quick-add-form');
    form.style.display = form.style.display === 'none' ? 'block' : 'none';
  });
  document.getElementById('quick-submit').addEventListener('click', quickAddEntry);

  // 复盘筛选器
  document.getElementById('review-mode').addEventListener('change', () => {
    initReviewFilter();
    const today = todayStr();
    const mode = document.getElementById('review-mode').value;
    document.getElementById('review-period').value = mode === 'month' ? today.slice(0,7) : today.slice(0,4);
    renderReview();
  });
  document.getElementById('review-period').addEventListener('change', renderReview);
  document.getElementById('btn-export').addEventListener('click', exportCSV);
  document.getElementById('btn-import').addEventListener('click', () => document.getElementById('file-import').click());
  document.getElementById('file-import').addEventListener('change', (e) => {
    if (e.target.files[0]) importCSV(e.target.files[0]);
    e.target.value = '';
  });
  document.getElementById('btn-export-json').addEventListener('click', exportJSON);
  document.getElementById('btn-import-json').addEventListener('click', () => document.getElementById('file-import-json').click());
  document.getElementById('file-import-json').addEventListener('change', (e) => {
    if (e.target.files[0]) importJSON(e.target.files[0]);
    e.target.value = '';
  });
  document.getElementById('btn-clear').addEventListener('click', () => {
    if (!confirm('确定要清空所有记录吗？\n预算设置会保留。此操作无法撤销。')) return;
    state.entries = [];
    saveEntries();
    renderAll();
    toast('已清空');
  });
})();
